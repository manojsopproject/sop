<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>KisanMitra — Government Schemes</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .page-content { max-width:1200px; margin:0 auto; padding:1.5rem; }
    .schemes-hero { background:linear-gradient(135deg,#1a3a7b,#2a5bd6); color:#fff; padding:2rem 1.5rem; border-radius:var(--radius-lg); margin-bottom:1.5rem; position:relative; overflow:hidden; }
    .schemes-hero::after { content:'🏛️'; position:absolute; right:1.5rem; bottom:-10px; font-size:6rem; opacity:0.12; }
    .schemes-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(340px,1fr)); gap:1.5rem; }
    @media(max-width:600px) { .schemes-grid{grid-template-columns:1fr;} }

    /* Scheme card */
    .scheme-card { background:var(--white); border-radius:var(--radius-lg); box-shadow:var(--shadow-sm); border:1px solid var(--cream-200); overflow:hidden; transition:all var(--transition); animation:fadeUp 0.4s ease both; }
    .scheme-card:hover { box-shadow:var(--shadow-md); transform:translateY(-3px); }
    .scheme-header { padding:1.25rem 1.4rem; display:flex; align-items:flex-start; gap:14px; }
    .scheme-icon-wrap { width:52px; height:52px; border-radius:14px; display:flex; align-items:center; justify-content:center; font-size:1.3rem; flex-shrink:0; }
    .scheme-name { font-family:'Rajdhani',sans-serif; font-size:1.2rem; font-weight:700; color:var(--green-800); }
    .scheme-full-name { font-size:0.78rem; color:var(--text-500); margin-top:2px; line-height:1.4; }
    .scheme-hindi { font-size:0.82rem; color:var(--text-700); margin-top:3px; }
    .scheme-tag { display:inline-block; padding:2px 10px; border-radius:20px; font-size:0.7rem; font-weight:700; letter-spacing:0.05em; text-transform:uppercase; margin-left:auto; white-space:nowrap; flex-shrink:0; }
    .scheme-benefit { display:flex; gap:10px; align-items:flex-start; padding:12px 1.4rem; background:var(--gold-100); border-left:3px solid var(--gold); margin:0; font-size:0.88rem; color:var(--text-700); line-height:1.5; }
    .scheme-benefit i { flex-shrink:0; margin-top:3px; }

    /* Expandable details */
    .scheme-details { border:none; outline:none; }
    .scheme-details summary { list-style:none; padding:12px 1.4rem; cursor:pointer; display:flex; align-items:center; gap:8px; font-size:0.85rem; font-weight:600; color:var(--green-700); border-top:1px solid var(--cream-200); transition:background var(--transition); }
    .scheme-details summary:hover { background:var(--green-50); }
    .scheme-details summary::-webkit-details-marker { display:none; }
    .scheme-details summary i.fa-chevron-down { margin-left:auto; transition:transform 0.3s; font-size:0.75rem; color:var(--text-300); }
    .scheme-details[open] summary i.fa-chevron-down { transform:rotate(180deg); }
    .scheme-details-body { padding:1rem 1.4rem; border-top:1px solid var(--cream-100); }
    .scheme-section { margin-bottom:1rem; }
    .scheme-section h5 { font-size:0.78rem; font-weight:700; color:var(--green-800); text-transform:uppercase; letter-spacing:0.08em; margin-bottom:6px; display:flex; align-items:center; gap:6px; }
    .scheme-section p, .scheme-section ul { font-size:0.87rem; color:var(--text-700); line-height:1.6; }
    .scheme-section ul { padding-left:0; list-style:none; display:flex; flex-direction:column; gap:4px; }
    .scheme-section ul li { display:flex; align-items:flex-start; gap:8px; }
    .scheme-section ul li i { color:var(--green-500); flex-shrink:0; margin-top:4px; font-size:0.75rem; }
    .scheme-footer { padding:1rem 1.4rem; border-top:1px solid var(--cream-200); display:flex; justify-content:flex-end; }
    .btn-scheme-apply { display:inline-flex; align-items:center; gap:8px; padding:9px 18px; border-radius:var(--radius-sm); color:white; font-size:0.88rem; font-weight:600; transition:all var(--transition); text-decoration:none; }
    .btn-scheme-apply:hover { filter:brightness(1.1); transform:translateY(-1px); color:white; }

    /* Filter bar */
    .schemes-filter { background:var(--white); border-radius:var(--radius-md); padding:1.1rem 1.25rem; box-shadow:var(--shadow-sm); border:1px solid var(--cream-200); margin-bottom:1.5rem; display:flex; gap:8px; flex-wrap:wrap; align-items:center; }
    .schemes-filter span { font-size:0.78rem; color:var(--text-500); font-weight:600; text-transform:uppercase; letter-spacing:0.06em; margin-right:4px; }
    .filter-pill { padding:5px 14px; border-radius:20px; border:1.5px solid var(--cream-200); background:white; font-size:0.8rem; font-weight:600; cursor:pointer; transition:all var(--transition); color:var(--text-700); }
    .filter-pill:hover { border-color:var(--green-500); color:var(--green-600); }
    .filter-pill.active { background:var(--green-800); border-color:var(--green-800); color:white; }
    .scheme-count { font-size:0.82rem; color:var(--text-500); margin-left:auto; }

    @keyframes fadeUp { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
  </style>
</head>
<body>
  <div id="toastContainer" class="toast-container"></div>

  <nav class="navbar">
    <a href="dashboard.html" class="navbar-brand">
      <div class="navbar-logo">🌾</div>
      <div class="navbar-brand-text">
        <span class="brand-main">KisanMitra</span>
        <span class="brand-sub">Smart Farming</span>
      </div>
    </a>
    <ul class="navbar-nav-links">
      <li><a href="dashboard.html"><i class="fas fa-home"></i> <span data-i18n="nav.dashboard">Dashboard</span></a></li>
      <li><a href="crops.html"><i class="fas fa-seedling"></i> <span data-i18n="nav.crops">Crop Advisor</span></a></li>
      <li><a href="prices.html"><i class="fas fa-chart-bar"></i> <span data-i18n="nav.prices">Market Prices</span></a></li>
      <li><a href="pest.html"><i class="fas fa-bug"></i> <span data-i18n="nav.pest">Pest Check</span></a></li>
      <li><a href="schemes.html"><i class="fas fa-scroll"></i> <span data-i18n="nav.schemes">Schemes</span></a></li>
    </ul>
    <div class="navbar-actions">
      <button class="lang-btn" id="langBtn" onclick="toggleLang()">हिंदी</button>
      <button class="voice-btn" onclick="toggleVoice()" title="Voice Command"><i class="fas fa-microphone"></i></button>
      <a href="profile.html" class="nav-avatar"><i class="fas fa-user-circle"></i></a>
      <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </nav>

  <main class="page-content">
    <div class="schemes-hero">
      <h1 style="color:#fff;font-size:1.8rem;margin-bottom:4px;position:relative;z-index:1;">
        <i class="fas fa-landmark" style="color:#93c5fd;"></i> <span data-i18n="scheme.title">Government Schemes</span>
      </h1>
      <p style="opacity:0.85;font-size:0.9rem;position:relative;z-index:1;">8 major central government schemes for Indian farmers — eligibility, documents & how to apply.</p>
    </div>

    <!-- Filter bar -->
    <div class="schemes-filter">
      <span>Filter:</span>
      <button class="filter-pill active" onclick="filterSchemes('all',this)">All Schemes</button>
      <button class="filter-pill" onclick="filterSchemes('Income Support',this)">Income Support</button>
      <button class="filter-pill" onclick="filterSchemes('Crop Insurance',this)">Insurance</button>
      <button class="filter-pill" onclick="filterSchemes('Irrigation',this)">Irrigation</button>
      <button class="filter-pill" onclick="filterSchemes('Credit',this)">Credit</button>
      <button class="filter-pill" onclick="filterSchemes('Organic Farming',this)">Organic</button>
      <span class="scheme-count" id="schemeCount"></span>
    </div>

    <div class="schemes-grid" id="schemesContainer">
      <div style="text-align:center;padding:3rem;grid-column:1/-1;color:var(--text-500);">
        <i class="fas fa-spinner fa-spin" style="font-size:2rem;color:var(--green-500);"></i>
        <p style="margin-top:1rem;">Loading schemes…</p>
      </div>
    </div>
  </main>

  <script src="js/i18n.js"></script>
  <script src="js/common.js"></script>
  <script src="js/schemes.js"></script>
  <script src="js/voice.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => { requireAuth(); });

    let allSchemes = [];

    // Override loadSchemes to capture data for filtering
    const _origLoad = loadSchemes;
    async function loadSchemesWithFilter() {
      const container = document.getElementById('schemesContainer');
      try {
        const res = await fetch('data/schemes.json');
        allSchemes = await res.json();
        renderSchemes(allSchemes, container);
        document.getElementById('schemeCount').textContent = `${allSchemes.length} schemes`;
      } catch {
        container.innerHTML = `<div style="text-align:center;padding:3rem;grid-column:1/-1;color:var(--terra-500);"><i class="fas fa-exclamation-triangle" style="font-size:2rem;"></i><p style="margin-top:1rem;">Failed to load schemes.</p></div>`;
      }
    }

    function filterSchemes(category, btn) {
      document.querySelectorAll('.filter-pill').forEach(p => p.classList.remove('active'));
      btn.classList.add('active');
      const filtered = category === 'all' ? allSchemes : allSchemes.filter(s => s.category === category);
      renderSchemes(filtered, document.getElementById('schemesContainer'));
      document.getElementById('schemeCount').textContent = `${filtered.length} schemes`;
    }

    document.addEventListener('DOMContentLoaded', loadSchemesWithFilter);
  </script>
</body>
</html>
