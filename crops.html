<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kisan Seva — Crop Advisor</title>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
  <link rel="stylesheet" href="css/styles.css">
  <style>
    .crop-hero { background:linear-gradient(135deg,var(--green-700),var(--green-500)); color:#fff; padding:2rem 1.5rem; border-radius:var(--radius-lg); margin-bottom:1.5rem; }
    .crop-form-card { background:var(--white); border-radius:var(--radius-lg); padding:2rem; box-shadow:var(--shadow-sm); border:1px solid var(--cream-200); margin-bottom:1.5rem; }
    .crop-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(140px,1fr)); gap:1rem; margin-top:1rem; }
    .crop-card { background:var(--white); border:2px solid var(--cream-200); border-radius:var(--radius-md); padding:1.25rem; text-align:center; cursor:pointer; transition:all var(--transition); animation:fadeUp 0.4s ease both; }
    .crop-card:hover { border-color:var(--green-400); box-shadow:var(--shadow-md); transform:translateY(-4px); }
    .crop-emoji { font-size:2.5rem; margin-bottom:8px; }
    .crop-name { font-weight:700; font-size:0.9rem; color:var(--green-800); }
    .crop-badge { display:inline-block; margin-top:6px; padding:2px 8px; background:var(--green-100); color:var(--green-700); border-radius:20px; font-size:0.7rem; font-weight:600; }
    .crop-tip-banner { background:linear-gradient(135deg,var(--gold-100),#fff8e1); border-left:4px solid var(--gold); padding:1rem 1.25rem; border-radius:0 var(--radius-md) var(--radius-md) 0; display:flex; gap:12px; align-items:flex-start; margin-bottom:1.25rem; font-size:0.9rem; color:var(--text-700); }
    .crop-tip-banner i { color:var(--gold); font-size:1.1rem; flex-shrink:0; margin-top:2px; }
    .form-row { display:grid; grid-template-columns:1fr 1fr; gap:1rem; }
    @media(max-width:500px){ .form-row{grid-template-columns:1fr;} }
    @keyframes fadeUp { from{opacity:0;transform:translateY(16px);} to{opacity:1;transform:translateY(0);} }
    .empty-state { text-align:center; padding:3rem; color:var(--text-300); }
    .empty-state i { font-size:3rem; margin-bottom:1rem; display:block; }
    .season-info { display:flex; gap:1rem; flex-wrap:wrap; margin-bottom:1.25rem; }
    .season-chip { display:flex; align-items:center; gap:6px; padding:6px 14px; background:var(--white); border:1.5px solid var(--cream-200); border-radius:20px; font-size:0.8rem; color:var(--text-700); font-weight:500; }
  </style>
</head>
<body>
  <div id="toastContainer" class="toast-container"></div>

  <nav class="navbar">
    <a href="dashboard.html" class="navbar-brand">
      <div class="navbar-logo">🌾</div>
      <div class="navbar-brand-text">
        <span class="brand-main">Kisan Seva</span>
        <span class="brand-sub">Smart Farming</span>
      </div>
    </a>
    <ul class="navbar-nav-links">
      <li><a href="dashboard.html"><i class="fas fa-home"></i> <span data-i18n="nav.dashboard">Dashboard</span></a></li>
      <li><a href="crops.html"><i class="fas fa-seedling"></i> <span data-i18n="nav.crops">Crop Advisor</span></a></li>
      <li><a href="prices.html"><i class="fas fa-chart-bar"></i> <span data-i18n="nav.prices">Market Prices</span></a></li>
      <li><a href="pest.html"><i class="fas fa-bug"></i> <span data-i18n="nav.pest">Pest Check</span></a></li>
      <li><a href="schemes.html"><i class="fas fa-scroll"></i> <span data-i18n="nav.schemes">Schemes</span></a></li>
    </ul>
    <div class="navbar-actions">
      <button class="lang-btn" id="langBtn" onclick="toggleLang()">हिंदी</button>
      <button class="voice-btn" onclick="toggleVoice()" title="Voice Command"><i class="fas fa-microphone"></i></button>
      <a href="profile.html" class="nav-avatar"><i class="fas fa-user-circle"></i></a>
      <button onclick="logout()" class="btn-logout"><i class="fas fa-sign-out-alt"></i></button>
    </div>
  </nav>

  <main class="page-content">
    <div class="crop-hero">
      <h1 style="color:#fff;font-size:1.8rem;margin-bottom:4px;"><i class="fas fa-seedling" style="color:var(--gold-400);"></i> <span data-i18n="crop.title">Crop Advisor</span></h1>
      <p style="opacity:0.8;font-size:0.9rem;">Get smart crop recommendations based on your soil type and season.</p>
    </div>

    <!-- Season reference -->
    <div class="season-info">
      <div class="season-chip"><i class="fas fa-sun" style="color:#f57c00;"></i> Kharif (Jun–Oct): Rainy season crops</div>
      <div class="season-chip"><i class="fas fa-snowflake" style="color:#4895ef;"></i> Rabi (Oct–Mar): Winter crops</div>
      <div class="season-chip"><i class="fas fa-cloud-sun" style="color:var(--green-500);"></i> Zaid (Mar–Jun): Summer crops</div>
    </div>

    <div class="crop-form-card">
      <form onsubmit="recommendCrops(event)" novalidate>
        <div class="form-row">
          <div class="form-group">
            <label class="form-label-custom" data-i18n="crop.soil">Soil Type</label>
            <select id="soilType" class="form-select-custom">
              <option value="">Select Soil Type</option>
              <option value="Sandy">Sandy</option>
              <option value="Loamy">Loamy (Domat)</option>
              <option value="Clay">Clay (Chiknai)</option>
              <option value="Black">Black (Regur)</option>
              <option value="Red">Red (Laterite)</option>
              <option value="Alluvial">Alluvial (Khadar)</option>
            </select>
          </div>
          <div class="form-group">
            <label class="form-label-custom" data-i18n="crop.season">Season</label>
            <select id="season" class="form-select-custom">
              <option value="">Select Season</option>
              <option value="Kharif">Kharif (खरीफ)</option>
              <option value="Rabi">Rabi (रबी)</option>
              <option value="Zaid">Zaid (ज़ायद)</option>
            </select>
          </div>
        </div>
        <button type="submit" id="cropBtn" class="btn-primary-custom">
          <i class="fas fa-magic"></i>
          <span data-i18n="crop.btn">Get Recommendations</span>
        </button>
      </form>
    </div>

    <div id="cropResult"></div>
  </main>

  <script src="js/i18n.js"></script>
  <script src="js/common.js"></script>
  <script src="js/crops.js"></script>
  <script src="js/voice.js"></script>
  <script>
    document.addEventListener('DOMContentLoaded', () => { requireAuth(); });
  </script>
</body>
</html>
