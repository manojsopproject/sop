server {
    listen $PORT;
    server_name _;
    root /app;
    index index.html;

    # Serve static files
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Cache static assets
    location ~* \.(css|js|json|png|jpg|ico|woff2?)$ {
        expires 1d;
        add_header Cache-Control "public";
    }

    # CORS for API calls (OpenWeatherMap etc.)
    add_header Access-Control-Allow-Origin "*";

    # Gzip
    gzip on;
    gzip_types text/html text/css application/javascript application/json;
}
